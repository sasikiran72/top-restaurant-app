<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Review | Top Restaurants</title>
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <a class="skip-link" href="#mainContent">Skip to main content</a>

  <nav class="navbar navbar-expand-lg navbar-dark bg-dark" aria-label="Main navigation">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html">Top Restaurants</a>
      <button
        class="navbar-toggler"
        type="button"
        data-bs-toggle="collapse"
        data-bs-target="#mainNavbar"
        aria-controls="mainNavbar"
        aria-expanded="false"
        aria-label="Toggle navigation"
      >
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="mainNavbar">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="signup.html">Sign Up</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html">Login</a></li>
          <li class="nav-item"><a class="nav-link active" href="add-review.html">Add Review</a></li>
          <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
          <li class="nav-item"><a class="nav-link" href="accessibility.html">Accessibility</a></li>

          <li class="nav-item">
            <button id="logoutBtn" class="btn btn-danger ms-lg-2 mt-2 mt-lg-0" type="button">
              Logout
            </button>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main id="mainContent" class="container my-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card p-4">
          <h1 class="h3 mb-4">Submit a Review</h1>

          <div id="reviewMessage" aria-live="polite"></div>

          <form id="reviewForm" novalidate>
            <div class="mb-3">
              <label for="restaurantSelect" class="form-label">Select Restaurant</label>
              <select id="restaurantSelect" class="form-select" required>
                <option value="">Choose a restaurant</option>
              </select>
            </div>

            <div class="mb-3">
              <label for="reviewerName" class="form-label">Your Name</label>
              <input type="text" class="form-control" id="reviewerName" required />
            </div>

            <div class="mb-3">
              <label for="ratingInput" class="form-label">Rating (1 to 5)</label>
              <input
                type="number"
                class="form-control"
                id="ratingInput"
                min="1"
                max="5"
                required
              />
            </div>

            <div class="mb-3">
              <label for="reviewText" class="form-label">Review</label>
              <textarea
                id="reviewText"
                class="form-control"
                rows="5"
                required
              ></textarea>
            </div>

            <button type="submit" class="btn btn-success w-100">Submit Review</button>
          </form>
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-dark text-white text-center py-3 mt-5">
    <p class="mb-0">&copy; 2026 Top Restaurants of the Week | Accessible Web App</p>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
